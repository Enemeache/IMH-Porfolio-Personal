<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1080"/>
<title>Post 01 — Brand Statement</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #1B3A2D;
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .canvas {
    width: 1080px;
    height: 1080px;
    position: relative;
    background: #1B3A2D;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 80px 88px;
    overflow: hidden;
  }

  /* Fondo sutil — grid de puntos */
  .canvas::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(196,151,58,0.12) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  /* Gradiente radial esquina */
  .canvas::after {
    content: '';
    position: absolute;
    bottom: -200px;
    right: -200px;
    width: 700px;
    height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(196,151,58,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  /* TOP */
  .top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    z-index: 2;
  }

  .tag {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(196,151,58,0.75);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .tag::before {
    content: '';
    display: block;
    width: 32px;
    height: 1px;
    background: rgba(196,151,58,0.5);
  }

  .symbol {
    width: 44px;
    height: 44px;
    opacity: 0.5;
  }

  /* MIDDLE — headline */
  .middle {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 2;
    padding: 60px 0;
  }

  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-size: 88px;
    font-weight: 300;
    line-height: 1.0;
    letter-spacing: -0.02em;
    color: #F5EFE0;
    margin-bottom: 48px;
  }

  .headline em {
    font-style: italic;
    color: #C4973A;
    display: block;
  }

  .divider {
    width: 56px;
    height: 1px;
    background: rgba(196,151,58,0.5);
    margin-bottom: 36px;
  }

  .body-text {
    font-family: 'DM Sans', sans-serif;
    font-size: 18px;
    font-weight: 300;
    line-height: 1.7;
    color: rgba(245,239,224,0.6);
    max-width: 520px;
  }

  /* BOTTOM */
  .bottom {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    position: relative;
    z-index: 2;
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 400;
    letter-spacing: 0.06em;
    color: #F5EFE0;
  }

  .cta-pill {
    background: rgba(196,151,58,0.12);
    border: 1px solid rgba(196,151,58,0.3);
    border-radius: 100px;
    padding: 12px 28px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #C4973A;
  }

  /* Línea decorativa vertical izquierda */
  .accent-line {
    position: absolute;
    left: 88px;
    top: 180px;
    bottom: 180px;
    width: 1px;
    background: linear-gradient(to bottom, transparent, rgba(196,151,58,0.3) 30%, rgba(196,151,58,0.3) 70%, transparent);
    z-index: 1;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="accent-line"></div>

  <div class="top">
    <span class="tag">Agencia de Marketing</span>
    <svg class="symbol" viewBox="0 0 44 44" fill="none">
      <circle cx="22" cy="22" r="20" stroke="#C4973A" stroke-width="0.8" stroke-opacity="0.6"/>
      <circle cx="22" cy="22" r="14" stroke="#C4973A" stroke-width="0.5" stroke-opacity="0.3"/>
      <polygon points="22,4 24.8,16 36,12.5 27.5,22 36,31.5 24.8,28 22,40 19.2,28 8,31.5 16.5,22 8,12.5 19.2,16" stroke="#C4973A" stroke-width="0.8" fill="none" stroke-opacity="0.7"/>
      <circle cx="22" cy="22" r="2.5" fill="#C4973A" fill-opacity="0.8"/>
    </svg>
  </div>

  <div class="middle">
    <h1 class="headline">
      Hacemos que<br>tu marca tenga<br>
      <em>algo real<br>para decir.</em>
    </h1>
    <div class="divider"></div>
    <p class="body-text">
      Marketing para emprendedores y empresas<br>
      que quieren crecer bien, no solo crecer rápido.
    </p>
  </div>

  <div class="bottom">
    <span class="logo">küme</span>
    <span class="cta-pill">@kume.agenciamkt</span>
  </div>
</div>
</body>
</html>
